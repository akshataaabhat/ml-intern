<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ML Intern OCR training pipeline</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1: GPU check -->
  <rect x="220" y="20" width="240" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="43" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Check GPU availability</text>
  <text x="340" y="61" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">nvidia-smi on 8× A100-40GB nodes</text>

  <line x1="340" y1="72" x2="340" y2="100" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: For each model -->
  <rect x="200" y="100" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="123" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">For each of 12 models</text>
  <text x="340" y="141" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Pick free GPUs · set model + output dir</text>

  <line x1="340" y1="152" x2="340" y2="180" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: Download -->
  <rect x="220" y="180" width="240" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="206" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Download model from HF hub</text>

  <line x1="340" y1="224" x2="340" y2="252" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 4: Train -->
  <rect x="200" y="252" width="280" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="275" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">LoRA fine-tune via swift SFT</text>
  <text x="340" y="293" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">5 epochs · flash attn · early stop</text>

  <line x1="340" y1="304" x2="340" y2="332" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 5: Merge + serve -->
  <rect x="200" y="332" width="280" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="355" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Merge LoRA + launch vLLM</text>
  <text x="340" y="373" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">Serve on local port for eval</text>

  <line x1="340" y1="384" x2="340" y2="412" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 6: Eval -->
  <rect x="200" y="412" width="280" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="435" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">Run eval.py on IntentBench</text>
  <text x="340" y="453" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">F1 · CER · WER per model → results.json</text>

  <!-- Loop back arrow -->
  <path d="M200 438 L140 438 L140 126 L200 126" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="108" y="282" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">next</text>
  <text x="108" y="297" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">model</text>

  <!-- Side annotations -->
  <line x1="480" y1="278" x2="508" y2="278" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="514" y="282" font-family="sans-serif" font-size="12" fill="#5F5E5A">2× GPUs per job</text>

  <line x1="480" y1="358" x2="508" y2="358" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="514" y="362" font-family="sans-serif" font-size="12" fill="#5F5E5A">auto port assign</text>
</svg>
